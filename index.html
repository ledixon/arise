<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ARISE System</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #000; color: #fff; font-family: 'Inter', sans-serif; }
        .glass-panel {
            background: rgba(17, 24, 39, 0.7);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(139, 92, 246, 0.3);
            transition: all 0.3s ease;
        }
        .glass-panel:hover {
            border-color: #8b5cf6;
            box-shadow: 0 0 20px rgba(139, 92, 246, 0.4);
            transform: translateY(-5px);
        }
        .purple-glow { text-shadow: 0 0 10px #8b5cf6; }
    </style>
</head>
<body class="p-8">

    <header class="mb-12 text-center">
        <h1 id="system-title" class="text-5xl font-black tracking-tighter purple-glow mb-2">ARISE SYSTEM</h1>
        <p id="system-subtitle" class="text-gray-500 uppercase tracking-widest text-sm">Level: 10th Grade Engineer | GPA: 3.99</p>
        <button id="back-btn" onclick="location.reload()" class="hidden mt-4 px-4 py-1 border border-purple-500 text-purple-500 text-xs hover:bg-purple-500 hover:text-white transition-all">
            [ BACK TO MAIN MENU ]
        </button>
    </header>

    <div id="project-grid" class="grid grid-cols-1 sm:grid-cols-2 gap-8 max-w-6xl mx-auto">
        
        <div onclick="openCategory('electrical')" class="glass-panel rounded-xl overflow-hidden group cursor-pointer p-8">
            <h3 class="text-2xl font-bold mb-2">ELECTRICAL</h3>
            <p class="text-gray-400 text-sm">Power systems and digital logic.</p>
        </div>

        <div onclick="openCategory('mechanical')" class="glass-panel rounded-xl overflow-hidden group cursor-pointer p-8">
            <h3 class="text-2xl font-bold mb-2">MECHANICAL</h3>
            <p class="text-gray-400 text-sm">Kinematics and structural design.</p>
        </div>

        <div onclick="openCategory('aerospace')" class="glass-panel rounded-xl overflow-hidden group cursor-pointer p-8">
            <h3 class="text-2xl font-bold mb-2">AEROSPACE</h3>
            <p class="text-gray-400 text-sm">Propulsion and fluid dynamics.</p>
        </div>

        <div onclick="openCategory('mechatronics')" class="glass-panel rounded-xl overflow-hidden group cursor-pointer p-8">
            <h3 class="text-2xl font-bold mb-2">MECHATRONICS</h3>
            <p class="text-gray-400 text-sm">Robotics and automated control.</p>
        </div>

    </div>

    <script>
        const projects = {
            electrical: [
                { title: "Tesla Coil Build", desc: "Wireless power transfer.", xp: 150 },
                { title: "Logic Gates", desc: "Digital circuit basics.", xp: 50 }
            ],
            mechanical: [
                { title: "Bayer Process", desc: "Chemical extraction of Aluminum.", xp: 200 },
                { title: "Hydraulic Arm", desc: "Fluid pressure mechanics.", xp: 120 }
            ],
            aerospace: [
                { title: "Rocket Nozzles", desc: "Thrust and gas flow.", xp: 200 },
                { title: "Wing Lift", desc: "Aerodynamic testing.", xp: 100 }
            ],
            mechatronics: [
                { title: "Arduino Bot", desc: "Autonomous navigation.", xp: 150 },
                { title: "Sensor Fusion", desc: "LIDAR data processing.", xp: 180 }
            ]
        };

        function openCategory(type) {
            const grid = document.getElementById('project-grid');
            const title = document.getElementById('system-title');
            const backBtn = document.getElementById('back-btn');

            title.innerText = type.toUpperCase() + " ARCHIVES";
            backBtn.classList.remove('hidden');
            grid.innerHTML = ''; 

            projects[type].forEach(proj => {
                grid.innerHTML += `
                    <div class="glass-panel p-6 rounded-lg animate-pulse-slow">
                        <div class="h-32 bg-black mb-4 flex items-center justify-center border border-purple-900 rounded">
                            <span class="text-purple-500 text-xs font-mono">[ VIDEO FEED ]</span>
                        </div>
                        <h4 class="text-white font-bold text-lg">${proj.title}</h4>
                        <p class="text-gray-400 text-sm mb-4">${proj.desc}</p>
                        <div class="flex justify-between items-center">
                            <span class="text-purple-400 font-mono text-xs">+${proj.xp} XP</span>
                            <button class="bg-purple-900 px-3 py-1 text-xs text-white rounded hover:bg-purple-600 transition-colors">WATCH</button>
                        </div>
                    </div>
                `;
            });
        }
    </script>
</body>
</html>
