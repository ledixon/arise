<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ARISE | Global Engineering System</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap');
        body { background-color: #020202; color: #fff; font-family: 'Orbitron', sans-serif; height: 100vh; overflow: hidden; }
        .sidebar { border-right: 1px solid #2e1065; background: rgba(5, 5, 5, 0.8); }
        .nav-item { transition: all 0.3s ease; border-left: 3px solid transparent; }
        .nav-item:hover { background: rgba(139, 92, 246, 0.1); border-left: 3px solid #8b5cf6; }
        .system-card { background: #0a0a0a; border: 1px solid #1e1b4b; transition: 0.3s; }
        .system-card:hover { border-color: #8b5cf6; box-shadow: 0 0 15px rgba(139, 92, 246, 0.2); }
        .scanner-line { height: 2px; background: #8b5cf6; position: absolute; width: 100%; animation: scan 2s infinite; }
        @keyframes scan { 0% { top: 0; } 100% { top: 100%; } }
        #main-display::-webkit-scrollbar { width: 4px; }
        #main-display::-webkit-scrollbar-thumb { background: #2e1065; }
    </style>
</head>
<body class="flex">

    <aside class="sidebar w-72 flex flex-col p-6">
        <div class="mb-10">
            <h1 class="text-2xl font-black tracking-tighter text-purple-500">ARISE</h1>
            <p class="text-[9px] text-gray-500 tracking-[0.4em]">RANK: E | USER: LEDIXON</p>
        </div>

        <nav class="flex-1 space-y-4">
            <button onclick="location.reload()" class="nav-item w-full text-left p-3 text-xs tracking-widest text-gray-400 hover:text-white">HOME</button>
            <button onclick="showExplore()" class="nav-item w-full text-left p-3 text-xs tracking-widest text-gray-400 hover:text-white">EXPLORE</button>
            <button onclick="showLeaderboard()" class="nav-item w-full text-left p-3 text-xs tracking-widest text-gray-400 hover:text-white">LEADERBOARD</button>
        </nav>

        <div class="mt-auto pt-6 border-t border-purple-900/30">
            <div class="flex justify-between text-[9px] mb-2 text-purple-400">
                <span>SYSTEM XP</span>
                <span>150 / 1000</span>
            </div>
            <div class="h-1 bg-gray-900 rounded-full overflow-hidden">
                <div class="h-full bg-purple-600 w-[15%] shadow-[0_0_8px_#8b5cf6]"></div>
            </div>
        </div>
    </aside>

    <main id="main-display" class="flex-1 overflow-y-auto p-12">
        <h2 id="view-title" class="text-4xl font-bold mb-10 tracking-tighter uppercase italic">System Interface</h2>
        
        <div id="content-grid" class="grid grid-cols-1 md:grid-cols-2 gap-8">
            <div onclick="openCategory('electrical')" class="system-card p-10 cursor-pointer">
                <h3 class="text-xl font-bold">ELECTRICAL</h3>
                <p class="text-[10px] text-gray-500 mt-2 tracking-widest">ARCHIVE ACCESS AVAILABLE</p>
            </div>
            <div onclick="openCategory('mechanical')" class="system-card p-10 cursor-pointer">
                <h3 class="text-xl font-bold">MECHANICAL</h3>
                <p class="text-[10px] text-gray-500 mt-2 tracking-widest">ARCHIVE ACCESS AVAILABLE</p>
            </div>
            <div onclick="openCategory('aerospace')" class="system-card p-10 cursor-pointer">
                <h3 class="text-xl font-bold">AEROSPACE</h3>
                <p class="text-[10px] text-gray-500 mt-2 tracking-widest">ARCHIVE ACCESS AVAILABLE</p>
            </div>
            <div onclick="openCategory('mechatronics')" class="system-card p-10 cursor-pointer">
                <h3 class="text-xl font-bold">MECHATRONICS</h3>
                <p class="text-[10px] text-gray-500 mt-2 tracking-widest">ARCHIVE ACCESS AVAILABLE</p>
            </div>
        </div>
    </main>

    <div id="camera-overlay" class="fixed inset-0 bg-black/95 z-50 hidden flex flex-col items-center justify-center">
        <div class="relative w-full max-w-xl border border-purple-500">
            <div class="scanner-line"></div>
            <video id="webcam" autoplay playsinline class="w-full"></video>
        </div>
        <div id="ai-status" class="mt-6 text-purple-400 text-xs tracking-[0.3em]">ANALYZING PROJECT COMPONENTS...</div>
        <button onclick="closeCamera()" class="mt-8 px-10 py-2 border border-white text-xs hover:bg-white hover:text-black transition">ABORT SCAN</button>
    </div>

    <script>
        const projects = {
            electrical: [{title: "Tesla Coil", xp: 150}, {title: "Logic Gates", xp: 50}],
            mechanical: [{title: "Bayer Process", xp: 200}, {title: "Hydraulic Press", xp: 120}],
            aerospace: [{title: "Rocket Engine", xp: 250}, {title: "Fluid Dynamics", xp: 100}],
            mechatronics: [{title: "Robot Arm", xp: 180}, {title: "Neural Sync", xp: 300}]
        };

        function openCategory(type) {
            const grid = document.getElementById('content-grid');
            document.getElementById('view-title').innerText = type + " Archives";
            grid.innerHTML = '';
            projects[type].forEach(p => {
                grid.innerHTML += `
                    <div class="system-card p-6">
                        <div class="h-32 bg-purple-950/20 border border-purple-900/50 mb-4 flex items-center justify-center">
                             <span class="text-[9px] text-purple-500 tracking-[0.5em]">DECRYPTED VIDEO FEED</span>
                        </div>
                        <h4 class="font-bold">${p.title}</h4>
                        <div class="mt-4 flex justify-between items-center border-t border-gray-800 pt-4">
                            <span class="text-xs text-purple-400">+${p.xp} XP</span>
                            <button onclick="startCamera()" class="text-[9px] border border-purple-500 px-3 py-1 hover:bg-purple-500 transition-all">AI SCAN</button>
                        </div>
                    </div>
                `;
            });
        }

        function showLeaderboard() {
            document.getElementById('view-title').innerText = "World Leaderboard";
            document.getElementById('content-grid').innerHTML = `
                <div class="col-span-2 space-y-4">
                    <div class="p-4 bg-purple-900/20 border border-yellow-500 flex justify-between items-center">
                        <span class="text-yellow-500">#1 PLAYER: KEVIN_Z (RANK S)</span>
                        <span>145,200 XP</span>
                    </div>
                    <div class="p-4 bg-purple-900/10 border border-gray-400 flex justify-between items-center">
                        <span class="text-gray-400">#2 PLAYER: M0DERA (RANK S)</span>
                        <span>138,900 XP</span>
                    </div>
                    <div class="p-4 bg-purple-900/10 border border-orange-700 flex justify-between items-center">
                        <span class="text-orange-700">#3 PLAYER: RYU_ENG (RANK A)</span>
                        <span>92,450 XP</span>
                    </div>
                </div>
            `;
        }

        function showExplore() {
            document.getElementById('view-title').innerText = "Explore Feed";
            document.getElementById('content-grid').innerHTML = `
                <div class="col-span-2 text-center py-20 border border-dashed border-gray-800">
                    <p class="text-gray-600 text-xs tracking-widest">ALGORITHM ANALYZING YOUR INTERESTS...</p>
                </div>
            `;
        }

        async function startCamera() {
            document.getElementById('camera-overlay').classList.remove('hidden');
            const stream = await navigator.mediaDevices.getUserMedia({ video: true });
            document.getElementById('webcam').srcObject = stream;
            setTimeout(() => {
                document.getElementById('ai-status').innerText = "SUCCESS: PROJECT VERIFIED. +100 XP";
            }, 3000);
        }

        function closeCamera() {
            const video = document.getElementById('webcam');
            if (video.srcObject) video.srcObject.getTracks().forEach(t => t.stop());
            document.getElementById('camera-overlay').classList.add('hidden');
        }
    </script>
</body>
</html>
