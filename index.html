<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ARISE | Mechanical Engineering System</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap');
        body { background-color: #020202; color: #fff; font-family: 'Orbitron', sans-serif; height: 100vh; overflow: hidden; }
        .sidebar { border-right: 1px solid #2e1065; background: rgba(5, 5, 5, 0.95); z-index: 40; }
        .system-card { background: #0a0a0a; border: 1px solid #1e1b4b; transition: 0.3s; position: relative; border-radius: 8px; overflow: hidden; }
        .system-card:hover { border-color: #a855f7; box-shadow: 0 0 20px rgba(168, 85, 247, 0.2); }
        .arise-glow { animation: arise 1.5s ease-out forwards; }
        @keyframes arise {
            0% { box-shadow: 0 0 0px #a855f7; transform: scale(1); }
            50% { box-shadow: 0 0 50px #a855f7; transform: scale(1.02); }
            100% { box-shadow: 0 0 10px #a855f7; transform: scale(1); }
        }
        .scanner-line { height: 2px; background: #a855f7; position: absolute; width: 100%; animation: scan 2s infinite; }
        @keyframes scan { 0% { top: 0; } 100% { top: 100%; } }
        .xp-fill { transition: width 1s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
    </style>
</head>
<body class="flex">

    <aside class="sidebar w-72 flex flex-col p-6 h-full">
        <div class="mb-10">
            <h1 class="text-2xl font-black tracking-tighter text-purple-500 italic">ARISE</h1>
            <p class="text-[9px] text-gray-500 tracking-[0.4em]">RANK: E | LEDIXON</p>
        </div>

        <nav class="flex-1 space-y-4">
            <button onclick="loadHome()" class="w-full text-left p-3 text-[10px] tracking-widest text-gray-400 hover:text-purple-400 transition">HOME ARCHIVE</button>
            <button class="w-full text-left p-3 text-[10px] tracking-widest text-gray-600 cursor-not-allowed">SKILLS (LOCKED)</button>
        </nav>

        <div class="mt-auto pt-6 border-t border-purple-900/30">
            <div class="flex justify-between text-[9px] mb-2 text-purple-400 uppercase tracking-widest">
                <span>System Mana (XP)</span>
                <span id="xp-counter">0 / 1000</span>
            </div>
            <div class="h-1 bg-gray-900 rounded-full overflow-hidden">
                <div id="xp-bar-fill" class="xp-fill h-full bg-purple-600 w-0 shadow-[0_0_10px_#a855f7]"></div>
            </div>
        </div>
    </aside>

    <div class="flex-1 flex flex-col overflow-hidden">
        <header class="h-16 border-b border-purple-900/30 flex items-center justify-between px-8 bg-black/50">
            <div class="text-[10px] tracking-[0.3em] text-purple-300">MECHANICAL ENGINEERING INTERFACE</div>
            <div class="flex gap-4">
                <button class="text-[9px] tracking-widest border border-purple-500 px-4 py-1 hover:bg-purple-500 transition">SYNC REPO</button>
            </div>
        </header>

        <main id="main-display" class="flex-1 overflow-y-auto p-12">
            <h2 id="view-title" class="text-4xl font-bold mb-10 tracking-tighter uppercase italic text-purple-100">Engineering Sectors</h2>
            <div id="content-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
                </div>
        </main>
    </div>

    <div id="camera-overlay" class="fixed inset-0 bg-black/98 z-50 hidden flex flex-col items-center justify-center">
        <div class="relative w-full max-w-xl border border-purple-500 shadow-[0_0_50px_rgba(168,85,247,0.3)]">
            <div class="scanner-line"></div>
            <video id="webcam" autoplay playsinline class="w-full h-auto"></video>
        </div>
        <div id="ai-status" class="mt-8 text-purple-400 text-xs tracking-[0.5em] animate-pulse">ANALYZING GEOMETRY...</div>
        <button onclick="closeCamera()" class="mt-8 px-10 py-2 border border-white text-[10px] tracking-widest hover:bg-white hover:text-black transition">ABORT SCAN</button>
    </div>

    <script>
        let currentXP = 0;
        const projects = {
            statics: [
                {title: "Truss Bridge Analysis", xp: 150, vid: "pWf8vV_1C7s", icon: "🌉"}
            ],
            thermodynamics: [
                {title: "Aluminum Extraction", xp: 200, vid: "1-W1fMvSIsE", icon: "🧪"}
            ],
            kinematics: [
                {title: "Stirling Engine Cycle", xp: 300, vid: "731aXG5yIas", icon: "⚙️"}
            ]
        };

        function loadHome() {
            document.getElementById('view-title').innerText = "Engineering Sectors";
            const grid = document.getElementById('content-grid');
            grid.innerHTML = '';
            
            Object.keys(projects).forEach(cat => {
                const project = projects[cat][0];
                grid.innerHTML += `
                    <div onclick="openCategory('${cat}')" class="system-card p-10 cursor-pointer flex flex-col items-center">
                        <div class="text-5xl mb-4 opacity-50 hover:opacity-100 transition">${project.icon}</div>
                        <h3 class="text-sm font-bold tracking-widest uppercase text-purple-400">${cat}</h3>
                    </div>
                `;
            });
        }

        function openCategory(cat) {
            document.getElementById('view-title').innerText = cat;
            const grid = document.getElementById('content-grid');
            grid.innerHTML = '';
            
            projects[cat].forEach(p => {
                const cardId = `card-${p.vid}`;
                grid.innerHTML += `
                    <div class="system-card p-4" id="${cardId}">
                        <div class="aspect-video mb-4 bg-gray-900">
                            <iframe class="w-full h-full" src="https://www.youtube.com/embed/${p.vid}" frameborder="0" allowfullscreen></iframe>
                        </div>
                        <h4 class="font-bold uppercase text-xs mb-4 text-white">${p.title}</h4>
                        <div class="flex justify-between items-center border-t border-purple-900/30 pt-4">
                            <span class="text-[9px] text-purple-400">+${p.xp} XP</span>
                            <button onclick="startCamera('${p.vid}', ${p.xp})" class="text-[9px] border border-purple-500 px-4 py-1.5 hover:bg-purple-500 transition">ARISE SCAN</button>
                        </div>
                    </div>
                `;
            });
        }

        async function startCamera(vidId, xpValue) {
            const overlay = document.getElementById('camera-overlay');
            const status = document.getElementById('ai-status');
            overlay.classList.remove('hidden');
            
            const stream = await navigator.mediaDevices.getUserMedia({ video: true });
            document.getElementById('webcam').srcObject = stream;

            setTimeout(() => {
                // System check: 80% success rate
                const success = Math.random() > 0.2; 

                if (success) {
                    status.innerText = "VERIFICATION COMPLETE: XP GRANTED";
                    status.style.color = "#a855f7";
                    document.getElementById(`card-${vidId}`).classList.add('arise-glow');
                    updateXP(xpValue);
                } else {
                    status.innerText = "SCAN FAILED: INSUFFICIENT DATA";
                    status.style.color = "#ff4444";
                }
            }, 3000);
        }

        function updateXP(amount) {
            currentXP = Math.min(currentXP + amount, 1000);
            document.getElementById('xp-bar-fill').style.width = (currentXP / 10) + "%";
            document.getElementById('xp-counter').innerText = `${currentXP} / 1000`;
            if (currentXP >= 1000) alert("RANK UP: SYSTEM EVOLVING...");
        }

        function closeCamera() {
            const video = document.getElementById('webcam');
            if (video.srcObject) video.srcObject.getTracks().forEach(t => t.stop());
            document.getElementById('camera-overlay').classList.add('hidden');
            document.getElementById('ai-status').innerText = "ANALYZING GEOMETRY...";
            document.getElementById('ai-status').style.color = "#a855f7";
        }

        loadHome();
    </script>
</body>
</html>
